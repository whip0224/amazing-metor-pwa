<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地鐵乘車資訊查詢</title>
	<link rel="stylesheet" href="style.css">
	<link rel="manifest" href="./manifest.json">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<link rel="manifest" href="./manifest.json">

</head>

<body>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>地鐵乘車查詢</h2>
        <select id="region-select" onchange="changeRegion()" style="padding: 5px 10px; font-size: 16px; border-radius: 5px;">
			<option value="sz">深圳地鐵 (SZ)</option>
			<option value="twp">台灣鐵路/捷運 (TW)</option>
			<option value="hk">香港港鐵 (HK)</option>
		</select>
    </div>

// ==========================================
    <div class="input-group">
        <label for="start-station">起點站：</label>
        <input type="text" id="start-station" list="station-list" placeholder="請輸入起點 (例如: 大)">
        		
		<div style="display: flex; gap: 10px; margin-top: 10px;">
			<button onclick="findNearbyStations('start', 'gps')" style="background-color: #28a745; font-size: 14px;">📍 目前位置</button>
			<button onclick="openMapPicker('start')" style="background-color: #6f42c1; font-size: 14px;">🗺️ 在地圖上點選</button>
		</div>
		<div id="start-nearby-results" style="margin-top: 10px; font-size: 14px; color: #555;"></div>		
    </div>	
// ==========================================
    <div class="input-group">
        <label for="end-station">終點站：</label>
        <input type="text" id="end-station" list="station-list" placeholder="請輸入終點">		
		
		<div style="display: flex; gap: 10px; margin-top: 10px;">
			<button onclick="openMapPicker('end')" style="background-color: #6f42c1; font-size: 14px;">🗺️ 在地圖上點選</button>
		</div>
		<div id="end-nearby-results" style="margin-top: 10px; font-size: 14px; color: #555;"></div>
    </div>
// ==========================================
    <datalist id="station-list"></datalist>

    <div class="input-group">
        <label>搜尋偏好：</label>
        <div style="display: flex; gap: 20px; margin-top: 5px;">
            <label><input type="radio" name="search-pref" value="transfer" checked> 最少轉乘</label>
            <label><input type="radio" name="search-pref" value="station"> 最少站數</label>
        </div>
    </div>

    <button onclick="searchRoute()">路線規劃</button>

    <div id="route-result"></div>	
	
	<div id="map-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;">
		<div style="background: white; width: 90%; max-width: 500px; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
			<h3 style="margin-top: 0; text-align: center;">請在地圖上點擊你的位置</h3>
			<div id="map-container" style="height: 350px; width: 100%; background: #eee; border-radius: 5px; margin-bottom: 15px;"></div>

			<div style="display: flex; justify-content: space-between;">
				<button onclick="closeMapPicker()" style="background-color: #dc3545; width: 45%;">取消</button>
				<button id="confirm-map-btn" style="background-color: #007bff; width: 45%;" disabled>確認座標</button>
			</div>
		</div>
	</div>	
	
    <script src="script.js"></script>
	
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				navigator.serviceWorker.register('./service-worker.js')
					.then(registration => {
						console.log('✅ ServiceWorker 註冊成功，範圍：', registration.scope);
					})
					.catch(err => {
						console.log('❌ ServiceWorker 註冊失敗：', err);
					});
			});
		}
	</script>
</body>
</html>
